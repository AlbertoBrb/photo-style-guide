<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Style Guide</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230e0e0c'/%3E%3Crect x='7' y='5' width='12' height='16' rx='1' fill='none' stroke='white' stroke-width='1.5'/%3E%3Crect x='11' y='5' width='12' height='16' rx='1' fill='%230e0e0c' stroke='white' stroke-width='1.5'/%3E%3Cline x1='13' y1='10' x2='20' y2='10' stroke='white' stroke-width='1'/%3E%3Cline x1='13' y1='13' x2='20' y2='13' stroke='white' stroke-width='1'/%3E%3Cline x1='13' y1='16' x2='17' y2='16' stroke='white' stroke-width='1'/%3E%3C/svg%3E">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0e0e0c;
      --white: #ffffff;
      --gray-1: #f7f7f4;
      --gray-2: #efefe9;
      --gray-3: #e2e2da;
      --gray-4: #b0b0a6;
      --gray-5: #7a7a70;
      --font: 'Helvetica Neue', Arial, sans-serif;
      --topbar-h: 56px;
      --catnav-h: 44px;
      --radius-sm:3px;--radius-md:4px;--radius-lg:6px;
      --subcatnav-h: 40px;
    }
    @media(prefers-color-scheme:dark){
      :root{--black:#f0efe8;--white:#1a1a18;--gray-1:#222220;--gray-2:#2c2c2a;--gray-3:#3a3a36;--gray-4:#6a6a62;--gray-5:#909088;}
    }

    html { font-size: 14px; }
    body { font-family: var(--font); background: var(--gray-1); color: var(--black); min-height: 100vh; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      height: var(--topbar-h);
      background: var(--white); border-bottom: 0.5px solid var(--gray-3);
      display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
    }
    .topbar-left { display: flex; align-items: center; gap: 20px; }

    .brand-switch {
      display: flex; align-items: center;
      background: var(--gray-1); border: 0.5px solid var(--gray-3);
      border-radius: 6px; padding: 3px; gap: 2px;
    }
    .brand-btn {
      padding: 5px 14px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 500; font-family: var(--font); border: none; background: none;
      cursor: pointer; border-radius: 4px; color: var(--gray-5); transition: background .15s, color .15s;
    }
    .brand-btn.active { background: var(--black); color: var(--white); }
    .divider-v { width: 0.5px; height: 18px; background: var(--gray-3); }
    .guide-label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray-4); }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px; stroke: var(--gray-4); fill: none; stroke-width: 1.5; pointer-events: none;
    }
    #searchInput {
      width: 200px; transition: opacity .2s; background: var(--gray-1); border: 0.5px solid var(--gray-3);
      border-radius: 6px; padding: 7px 12px 7px 30px; font-size: 12px;
      font-family: var(--font); color: var(--black); outline: none; transition: border-color .15s;
    }
    #searchInput:focus { border-color: var(--gray-5); }
    #searchInput::placeholder { color: var(--gray-4); }

    /* Admin button */
    .admin-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 500; font-family: var(--font); border: 0.5px solid var(--gray-3);
      border-radius: 6px; background: var(--white); color: var(--gray-5);
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .admin-btn:hover { border-color: var(--gray-5); color: var(--black); }
    .admin-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .admin-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

    /* ── CATEGORY NAV ── */
    .catnav {
      position: sticky; top: var(--topbar-h); z-index: 30;
      height: var(--catnav-h); background: var(--white); border-bottom: 0.5px solid var(--gray-3);
      display: flex; align-items: stretch; padding: 0 28px; overflow-x: auto; scrollbar-width: none;
    }
    .catnav::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; display: flex; align-items: center; padding: 0 14px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
      color: var(--gray-5); cursor: pointer; border-bottom: 2px solid transparent;
      white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
      font-family: var(--font); transition: color .12s;
    }
    .cat-tab:hover { color: var(--black); }
    .cat-tab.active { color: var(--black); border-bottom-color: var(--black); }

    /* ── LAYOUT ── */
    .layout { display: flex; flex-direction: column; max-width: 1440px; margin: 0 auto; min-height: calc(100vh - var(--topbar-h) - var(--catnav-h) - var(--subcatnav-h)); }

    /* ── SUBCATNAV (orizzontale) ── */
    .subcatnav {
      position: sticky; top: calc(var(--topbar-h) + var(--catnav-h)); z-index: 25;
      height: var(--subcatnav-h); background: var(--gray-1);
      border-bottom: 0.5px solid var(--gray-3);
      display: flex; align-items: center; padding: 0 28px; gap: 6px;
      overflow-x: auto; scrollbar-width: none;
    }
    .subcatnav::-webkit-scrollbar { display: none; }
    .subcat-btn {
      flex-shrink: 0; display: inline-flex; align-items: center;
      padding: 4px 14px; font-size: 12px; font-family: var(--font);
      color: var(--gray-5); background: none;
      border: 0.5px solid transparent; border-radius: 20px;
      cursor: pointer; transition: background .1s, color .1s, border-color .1s;
      white-space: nowrap; line-height: 1.4;
    }
    .subcat-btn:hover { color: var(--black); background: var(--gray-2); }
    .subcat-btn.active { color: var(--black); font-weight: 500; background: var(--white); border-color: var(--gray-3); }

    /* ── MAIN ── */
    .main { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }

    .context-bar{padding-bottom:16px;border-bottom:0.5px solid var(--gray-3);margin-bottom:16px;}
    .prod-category{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gray-4);font-weight:500;margin-bottom:4px;display:block;}
    .prod-title{font-size:24px;font-weight:400;letter-spacing:-0.02em;color:var(--black);line-height:1.2;}
    .prod-notes-inline{font-size:12px;color:var(--gray-5);line-height:1.6;margin-bottom:16px;max-width:600px;}

    .specs-strip { display: flex; gap: 24px; flex-wrap: wrap; }
    .spec-item { display: flex; flex-direction: column; gap: 3px; }
    .spec-key { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-4); font-weight: 500; }
    .spec-val { font-size: 12px; color: var(--black); }

    .shots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .shot-card {
      background: var(--white); border: 0.5px solid var(--gray-3);
      border-radius: 4px; overflow: hidden; cursor: pointer; transition: border-color .15s;
    }
    .shot-card:hover { border-color: var(--gray-5); }
    .shot-card.active { border-color: var(--black); }
    .shot-img-wrap { aspect-ratio: 3/4; background: var(--gray-1); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .shot-upload-target { position: relative; cursor: pointer; }
    .shot-preview-target { position: relative; cursor: zoom-in; }
    .shot-preview-hint {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(14,14,12,0); opacity: 0;
      transition: opacity .15s, background .15s;
      pointer-events: none;
    }
    .shot-preview-hint svg { width: 22px; height: 22px; stroke: #fff; }
    .shot-preview-target:hover .shot-preview-hint {
      opacity: 1; background: rgba(14,14,12,0.35);
    }
    .shot-upload-hint {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; background: rgba(14,14,12,0); opacity: 0;
      transition: opacity .15s, background .15s;
      pointer-events: none;
    }
    .shot-upload-hint svg { width: 20px; height: 20px; stroke: #fff; }
    .shot-upload-hint span { font-size: 11px; font-weight: 500; color: #fff; font-family: var(--font); }
    .shot-upload-target:hover .shot-upload-hint {
      opacity: 1; background: rgba(14,14,12,0.5);
    }
    .shot-empty-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .shot-empty-placeholder + .shot-upload-hint { opacity: 0.7; background: transparent; }
    .shot-upload-target:hover .shot-empty-placeholder + .shot-upload-hint { opacity: 1; background: rgba(14,14,12,0.15); }
    .bulk-upload-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0 4px;
    }
    .bulk-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px; font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      font-family: var(--font); background: var(--white);
      color: var(--black); border: 0.5px solid var(--gray-3);
      border-radius: 4px; cursor: pointer; transition: border-color .15s;
      white-space: nowrap;
    }
    .bulk-btn:hover { border-color: var(--black); }
    .bulk-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .bulk-hint { font-size: 11px; color: var(--gray-4); }
    .shot-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .shot-footer { padding: 11px 13px; border-top: 0.5px solid var(--gray-2); }
    .shot-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .shot-code { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; color: var(--gray-5); }
    .badge { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; padding: 2px 6px; border-radius: 2px; }
    .badge-req { background: var(--black); color: var(--white); }
    .badge-opt { background: var(--gray-2); color: var(--gray-5); }
    .shot-label { font-size: 13px; font-weight: 500; color: var(--black); margin-bottom: 2px; }
    .shot-desc { font-size: 11px; color: var(--gray-5); line-height: 1.4; }

    .detail-panel { background: var(--white); border: 0.5px solid var(--gray-3); border-radius: 4px; padding: 22px 26px; display: none; }
    .detail-panel.open { display: block; }
    .detail-hd { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-4); font-weight: 500; margin-bottom: 14px; }
    .detail-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
    .dk { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-4); font-weight: 500; margin-bottom: 4px; }
    .dv { font-size: 13px; color: var(--black); line-height: 1.5; }
    .brand-diff { margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--gray-2); font-size: 11px; color: var(--gray-5); line-height: 1.5; }
    .brand-diff strong { color: var(--black); font-weight: 500; }

    .empty-state { border: 0.5px dashed var(--gray-3); border-radius: 4px; padding: 36px; text-align: center; color: var(--gray-4); font-size: 12px; background: var(--white); }

    /* ══════════════════════════════
       ADMIN PANEL
    ══════════════════════════════ */
    .admin-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(14,14,12,0.4);
    }
    .admin-overlay.open { display: flex; align-items: flex-start; justify-content: flex-end; }

    .admin-drawer {
      background: var(--white); width: 480px; height: 100vh;
      border-left: 0.5px solid var(--gray-3); overflow-y: auto;
      display: flex; flex-direction: column;
    }

    .admin-header {
      padding: 20px 24px; border-bottom: 0.5px solid var(--gray-3);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--white); z-index: 10;
    }
    .admin-title { font-size: 13px; font-weight: 500; color: var(--black); }
    .admin-subtitle { font-size: 11px; color: var(--gray-4); margin-top: 2px; }
    .admin-close {
      background: none; border: none; cursor: pointer; padding: 6px;
      color: var(--gray-5); display: flex; align-items: center; justify-content: center;
    }
    .admin-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .admin-close:hover { color: var(--black); }

    .admin-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; flex: 1; }

    .admin-section-title {
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--gray-4); font-weight: 500; margin-bottom: 10px;
    }

    .admin-field { display: flex; flex-direction: column; gap: 5px; }
    .admin-field label { font-size: 11px; color: var(--gray-5); font-weight: 500; letter-spacing: 0.04em; }
    .admin-field input,
    .admin-field textarea,
    .admin-field select {
      font-family: var(--font); font-size: 12px; color: var(--black);
      background: var(--gray-1); border: 0.5px solid var(--gray-3); border-radius: 4px;
      padding: 8px 10px; outline: none; width: 100%; transition: border-color .15s;
      resize: vertical;
    }
    .admin-field input:focus,
    .admin-field textarea:focus,
    .admin-field select:focus { border-color: var(--gray-5); background: var(--white); }
    .admin-field textarea { min-height: 60px; line-height: 1.5; }

    .admin-divider { height: 0.5px; background: var(--gray-2); }

    .shots-admin { display: flex; flex-direction: column; gap: 12px; }
    .shot-admin-card {
      border: 0.5px solid var(--gray-3); border-radius: 4px; overflow: hidden;
    }
    .shot-admin-head {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--gray-1); border-bottom: 0.5px solid var(--gray-2);
    }
    .shot-admin-code { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; color: var(--gray-5); min-width: 24px; }
    .shot-admin-label { font-size: 12px; font-weight: 500; color: var(--black); flex: 1; }
    .shot-req-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray-5); cursor: pointer; }
    .shot-req-toggle input { accent-color: var(--black); cursor: pointer; }
    .shot-admin-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }

    /* Upload zone */
    .upload-zone {
      position: relative; border: 0.5px dashed var(--gray-3); border-radius: 4px;
      overflow: hidden; cursor: pointer; transition: border-color .15s;
      background: var(--gray-1); min-height: 120px;
      display: flex; align-items: center; justify-content: center;
    }
    .upload-zone:hover { border-color: var(--gray-5); }
    .upload-zone.drag-over { border-color: var(--black); background: var(--gray-2); }
    .upload-zone.drag-over .upload-zone-overlay { opacity: 1; background: rgba(0,0,0,0.55); }

    .img-preview-lg {
      width: 100%; height: 140px; object-fit: contain;
      display: block; background: var(--gray-1);
    }
    .img-placeholder-lg {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; width: 100%; padding: 24px 0; color: var(--gray-4);
    }
    .img-placeholder-lg svg { width: 28px; height: 28px; stroke: var(--gray-3); }
    .img-placeholder-lg span { font-size: 11px; color: var(--gray-4); }

    .upload-zone-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; background: rgba(14,14,12,0.0);
      opacity: 0; transition: opacity .15s, background .15s;
      cursor: pointer;
    }
    .upload-zone:hover .upload-zone-overlay { opacity: 1; background: rgba(14,14,12,0.52); }
    .upload-zone-overlay svg { width: 20px; height: 20px; stroke: #fff; }
    .upload-zone-overlay span { font-size: 12px; font-weight: 500; color: #fff; }
    .upload-zone-overlay small { font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 0.04em; text-align: center; padding: 0 12px; }

    .img-embed-status { min-height: 18px; padding: 4px 0 0; }
    .admin-img-preview-wrap {
      position: relative; border-radius: 4px; overflow: hidden;
      background: var(--gray-1); cursor: zoom-in;
    }
    .admin-img-preview-wrap .img-preview-lg {
      display: block; width: 100%; height: 160px;
      object-fit: contain; background: var(--gray-1);
    }
    .admin-preview-overlay {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: rgba(14,14,12,0); opacity: 0;
      transition: opacity .15s, background .15s;
    }
    .admin-img-preview-wrap:hover .admin-preview-overlay {
      opacity: 1; background: rgba(14,14,12,0.35);
    }
    .admin-preview-overlay svg { width: 24px; height: 24px; stroke: #fff; }
    .btn-replace-img {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 6px 12px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; font-family: var(--font);
      background: var(--white); color: var(--gray-5);
      border: 0.5px solid var(--gray-3); border-radius: 4px;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .btn-replace-img:hover { border-color: var(--black); color: var(--black); }
    .btn-replace-img svg { width: 12px; height: 12px; }
    .status-ok { font-size: 10px; color: #2d7a2d; letter-spacing: 0.04em; font-weight: 500; }

    .admin-footer {
      padding: 16px 24px; border-top: 0.5px solid var(--gray-3);
      display: flex; gap: 10px; align-items: center;
      position: sticky; bottom: 0; background: var(--white);
    }
    .btn-save {
      flex: 1; padding: 10px; font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; font-family: var(--font); background: var(--black);
      color: var(--white); border: none; border-radius: 4px; cursor: pointer; transition: opacity .15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-export {
      padding: 10px 16px; font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; font-family: var(--font); background: var(--white);
      color: var(--black); border: 0.5px solid var(--gray-3); border-radius: 4px; cursor: pointer; transition: border-color .15s;
    }
    .btn-export:hover { border-color: var(--black); }

    .save-status { font-size: 11px; color: var(--gray-5); }

    /* Import JSON */
    
    
    
    
    
    
    
    
    

    .unsaved-badge{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#854f0b;background:#faeeda;padding:3px 8px;border-radius:3px;display:none;margin-left:6px;}
    .unsaved-badge.visible{display:inline;}
    button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--black);outline-offset:2px;}

    .shots-grid { position: relative; }
    .shot-detail-inline {
      grid-column: 1 / -1;
      background: var(--white); border: 0.5px solid var(--gray-3);
      border-radius: 4px; padding: 20px 24px;
      animation: slideDown .15s ease;
    }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    /* ── SEARCH HERO ── */
    .search-hero {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; pointer-events: none;
      background: var(--gray-1);
    }
    .search-hero.hidden { display: none; }
    .hero-eyebrow {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gray-4); font-weight: 500; margin-bottom: 20px;
      font-family: var(--font);
    }
    .hero-search-wrap {
      position: relative; width: 520px; max-width: 90vw;
      pointer-events: all;
    }
    .hero-search-wrap svg {
      position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
      width: 17px; height: 17px; stroke: var(--gray-4); fill: none; stroke-width: 1.5;
      pointer-events: none;
    }
    .hero-search-input {
      width: 100%; background: var(--white);
      border: 0.5px solid var(--gray-3); border-radius: 40px;
      padding: 16px 24px 16px 50px;
      font-size: 17px; font-family: var(--font); color: var(--black);
      outline: none; transition: border-color .15s, box-shadow .15s;
      box-shadow: 0 2px 20px rgba(14,14,12,0.08);
    }
    .hero-search-input:focus {
      border-color: var(--gray-5);
      box-shadow: 0 4px 28px rgba(14,14,12,0.12);
    }
    .hero-search-input::placeholder { color: var(--gray-4); }
    .hero-support {
      margin-top: 14px; font-size: 12px; color: var(--gray-4);
      text-align: center; font-family: var(--font); line-height: 1.5;
      pointer-events: none; max-width: 400px;
    }
    .hero-nav-hint {
      margin-top: 20px; font-size: 12px; color: var(--gray-4); text-align: center;
      pointer-events: all; display: flex; align-items: center; gap: 8px;
    }
    .hero-nav-hint::before, .hero-nav-hint::after {
      content: ''; display: block; height: 0.5px; width: 40px; background: var(--gray-3);
    }
    .hero-nav-hint button {
      background: none; border: none; font-family: var(--font);
      font-size: 12px; color: var(--gray-5); cursor: pointer;
      padding: 0; transition: color .15s;
    }
    .hero-nav-hint button:hover { color: var(--black); }
    .empty-query { font-size: 18px; font-weight: 400; color: var(--black); margin-bottom: 8px; }
    .empty-msg { font-size: 12px; color: var(--gray-4); margin-bottom: 16px; }
    .empty-suggest { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .empty-suggest-btn {
      font-family: var(--font); font-size: 12px; color: var(--gray-5);
      background: var(--white); border: 0.5px solid var(--gray-3);
      border-radius: 20px; padding: 5px 14px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .empty-suggest-btn:hover { border-color: var(--black); color: var(--black); }
    #searchInput{width:320px;background:var(--white);border:0.5px solid var(--gray-3);border-radius:24px;padding:9px 16px 9px 40px;font-size:13px;font-family:var(--font);color:var(--black);outline:none;transition:border-color .2s,box-shadow .2s;box-shadow:0 1px 6px rgba(14,14,12,0.06);}
    #searchInput:focus{border-color:var(--gray-5);box-shadow:0 2px 12px rgba(14,14,12,0.10);}
    #searchInput::placeholder{color:var(--gray-4);}
    .search-wrap svg{left:14px;width:15px;height:15px;}
    .crop-section{margin-top:36px;padding-top:24px;border-top:0.5px solid var(--gray-2);}
    .crop-section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
    .crop-section-title{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500;color:var(--gray-4);flex:1;}
    .crop-add-btn{font-family:var(--font);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;color:var(--gray-5);background:none;border:0.5px solid var(--gray-3);border-radius:var(--radius-md,4px);padding:4px 10px;cursor:pointer;transition:border-color .15s,color .15s;}
    .crop-add-btn:hover{border-color:var(--black);color:var(--black);}
    .crop-empty{border:0.5px dashed var(--gray-3);border-radius:4px;padding:28px;text-align:center;font-size:11px;color:var(--gray-4);background:var(--white);cursor:pointer;transition:border-color .15s;}
    .crop-empty:hover{border-color:var(--gray-5);}
    .crop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
    .crop-remove-btn{background:none;border:none;font-size:14px;color:var(--gray-4);cursor:pointer;padding:0 2px;line-height:1;margin-left:auto;}
    .crop-remove-btn:hover{color:var(--black);}
    .shots-grid{position:relative;}
    .shot-detail-inline{grid-column:1/-1;background:var(--white);border:0.5px solid var(--gray-3);border-radius:4px;padding:20px 24px;animation:slideDown .15s ease;}
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .empty-query{font-size:18px;font-weight:400;color:var(--black);margin-bottom:8px;}
    .empty-msg{font-size:12px;color:var(--gray-4);margin-bottom:16px;}
    .empty-suggest{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    .empty-suggest-btn{font-family:var(--font);font-size:12px;color:var(--gray-5);background:var(--white);border:0.5px solid var(--gray-3);border-radius:20px;padding:5px 14px;cursor:pointer;transition:border-color .15s,color .15s;}
    .empty-suggest-btn:hover{border-color:var(--black);color:var(--black);}
    .unsaved-badge{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#854f0b;background:#faeeda;padding:3px 8px;border-radius:3px;display:none;margin-left:6px;}
    .unsaved-badge.visible{display:inline;}
    button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--black);outline-offset:2px;}
    .subcat-btn{white-space:nowrap;}
    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .subcatnav { padding: 0 14px; }
      .shots-grid { grid-template-columns: repeat(2,1fr); }
      .detail-grid { grid-template-columns: repeat(2,1fr); }
      .admin-drawer { width: 100vw; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 0 14px; }
      .main { padding: 18px 14px; }
      .guide-label { display: none; }
      #searchInput { width: 130px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div id="brandSwitch" class="brand-switch"></div>
    <span class="divider-v"></span>
    <span class="guide-label">Style Guide</span>
  </div>
  <div class="topbar-right">
    <div class="search-wrap">
      <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
      <input id="searchInput" type="text" placeholder="Search products…" autocomplete="off" spellcheck="false">
    </div>
    <button class="admin-btn" id="adminBtn" onclick="setEditMode(!editMode)">
      <svg viewBox="0 0 16 16"><path d="M11 2H5L2 8l6 8 6-8-3-6z"/><circle cx="8" cy="8" r="1.5"/></svg>
      Edit
    </button>
  </div>
</div>

<div class="search-hero" id="searchHero">
  <div class="hero-eyebrow">Still Life Style Guide</div>
  <div class="hero-search-wrap">
    <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
    <input id="heroSearchInput" class="hero-search-input" type="text" placeholder="Search a product or category…" autocomplete="off" spellcheck="false">
  </div>
  <div class="hero-support">Shot references for NET-A-PORTER &amp; MR PORTER still life photography.<br>Search by product name, category, or shooting technique.</div>
  <div class="hero-nav-hint"><button onclick="dismissHero()">Browse the catalog</button></div>
</div>
<nav class="catnav" id="catnav" role="tablist" aria-label="Categorie prodotto"></nav>
<nav class="subcatnav" id="subcatnav" aria-label="Sottocategorie"></nav>
<div class="layout">
  <main class="main" id="main" aria-live="polite"></main>
</div>
<div id="previewOverlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(14,14,12,0.88);align-items:center;justify-content:center;flex-direction:column;gap:16px;" onclick="closePreview()">
  <div style="position:absolute;top:20px;right:24px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:13px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;" onclick="closePreview()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle;margin-right:6px;"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>Close</div>
  <div id="previewLabel" style="color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;"></div>
  <img id="previewImg" src="" alt="" style="max-width:90vw;max-height:85vh;object-fit:contain;border-radius:2px;" onclick="event.stopPropagation()">
</div>
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-drawer" onclick="event.stopPropagation()">
    <div class="admin-header">
      <div><div class="admin-title" id="adminTitle">Editor</div><div class="admin-subtitle">Apply to confirm · Export data.json to save on GitHub</div></div>
      <button class="admin-close" onclick="closeAdmin()"><svg viewBox="0 0 16 16"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg></button>
    </div>
    <div class="admin-body" id="adminBody"></div>
    <div class="admin-footer">
      <button class="btn-save" onclick="saveAdmin()">Apply</button>
      <button class="btn-export" id="btnExport" onclick="exportJSON()">Export data.json <span class="unsaved-badge" id="unsavedBadge">&#9679; unsaved</span></button>
      <span class="save-status" id="saveStatus"></span>
    </div>
  </div>
</div>

<script>




/* ═══════════════════════════════════════════
   DATA — struttura base (viene sovrascritta
   dall'import JSON o dagli edit admin)
═══════════════════════════════════════════ */
const SHOT_ORDER = ["IN","BK","CU","E1"];
const SHOT_LABELS = { IN:"Front", BK:"Back", CU:"Detail", E1:"Extra" };
const SHARED_DEFAULTS = { Background:"#FFFFFF pure", Format:"1600×2000px · 72dpi", Retouching:"Standard — dust, lint, hard shadows" };
const BRANDS = {
  NAP: { label:"NET-A-PORTER", full:"Net-A-Porter" },
  MRP: { label:"MR PORTER",   full:"Mr Porter" }
};


let DATA={};
let DATA_LOADED=false;
var _lB='',_lC='',_lS='',_lE=null,_lQ='';

async function loadData(){
  try{
    const res=await fetch('./data.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    DATA=await res.json();DATA_LOADED=true;render();
  }catch(e){
    document.getElementById('main').innerHTML=
      '<div class="empty-state" style="padding:40px;"><div class="empty-query">Loading error</div>'
      +'<div class="empty-msg">Unable to load data.json.</div>'
      +'<div style="font-size:11px;color:var(--gray-4);font-family:monospace;margin-top:8px;">'+e.message+'</div></div>';
  }
}



/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let activeBrand = "NAP";
let activeCat   = "Shoes";
let activeSub   = "Sneakers";
let activeShot  = null;
let searchQ     = "";
let adminOpen   = false;

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function esq(s){ return String(s||"").replace(/'/g,"\\'"); }

function getFiltered(){
  const src=DATA[activeBrand]||{};
  const q=searchQ.trim().toLowerCase();
  if(!q) return src;
  const out={};
  for(const [cat,subs] of Object.entries(src)){
    const m={};
    for(const [sub,d] of Object.entries(subs)){
      if((cat+' '+sub+' '+(d.notes||'')).toLowerCase().includes(q)) m[sub]=d;
    }
    if(Object.keys(m).length) out[cat]=m;
  }
  return out;
}

function ensureActive(filtered){
  if(filtered[activeCat]){
    if(filtered[activeCat][activeSub]) return;
    activeSub=Object.keys(filtered[activeCat])[0]; return;
  }
  const cats=Object.keys(filtered);
  if(cats.length){ activeCat=cats[0]; activeSub=Object.keys(filtered[activeCat])[0]; }
}

function shotSVG(code){
  const icons={
    IN:`<svg width="40" height="54" viewBox="0 0 40 54" fill="none"><rect x="6" y="3" width="28" height="40" rx="2" stroke="var(--gray-4)" stroke-width="1"/><rect x="10" y="43" width="20" height="5" rx="1" fill="var(--gray-2)" stroke="var(--gray-3)" stroke-width=".7"/><circle cx="20" cy="21" r="4" fill="var(--gray-3)"/><text x="20" y="52" font-size="5.5" text-anchor="middle" fill="var(--gray-4)" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing=".1em">FRONT</text></svg>`,
    BK:`<svg width="40" height="54" viewBox="0 0 40 54" fill="none"><rect x="6" y="3" width="28" height="40" rx="2" stroke="var(--gray-4)" stroke-width="1"/><line x1="12" y1="13" x2="28" y2="13" stroke="var(--gray-3)" stroke-width=".7" stroke-dasharray="2 2"/><line x1="12" y1="19" x2="28" y2="19" stroke="var(--gray-3)" stroke-width=".7" stroke-dasharray="2 2"/><line x1="12" y1="25" x2="28" y2="25" stroke="var(--gray-3)" stroke-width=".7" stroke-dasharray="2 2"/><text x="20" y="52" font-size="5.5" text-anchor="middle" fill="var(--gray-4)" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing=".1em">BACK</text></svg>`,
    CU:`<svg width="40" height="54" viewBox="0 0 40 54" fill="none"><rect x="4" y="6" width="32" height="32" rx="2" stroke="var(--gray-4)" stroke-width="1"/><rect x="12" y="14" width="16" height="16" rx="1" fill="var(--gray-2)" stroke="var(--gray-4)" stroke-width=".9"/><circle cx="20" cy="22" r="4" fill="none" stroke="var(--gray-4)" stroke-width=".9"/><circle cx="20" cy="22" r="1.2" fill="var(--gray-4)"/><text x="20" y="52" font-size="5.5" text-anchor="middle" fill="var(--gray-4)" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing=".1em">DETAIL</text></svg>`,
    E1:`<svg width="40" height="54" viewBox="0 0 40 54" fill="none"><rect x="2" y="3" width="18" height="26" rx="2" stroke="var(--gray-3)" stroke-width=".7"/><rect x="23" y="3" width="14" height="17" rx="2" stroke="var(--gray-3)" stroke-width=".7"/><rect x="2" y="33" width="12" height="12" rx="2" stroke="var(--gray-3)" stroke-width=".7"/><rect x="18" y="28" width="20" height="17" rx="2" stroke="var(--gray-4)" stroke-width="1" fill="var(--gray-2)"/><text x="20" y="52" font-size="5.5" text-anchor="middle" fill="var(--gray-4)" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing=".1em">EXTRA</text></svg>`
  };
  return icons[code]||icons.E1;
}

/* ═══════════════════════════════════════════
   RENDER — GUIDE VIEW
═══════════════════════════════════════════ */
function renderBrandSwitch(){
  const el=document.getElementById("brandSwitch");
  el.innerHTML=Object.entries(BRANDS).map(([k,v])=>
    `<button class="brand-btn${k===activeBrand?" active":""}" onclick="setBrand('${k}')">${v.label}</button>`
  ).join(`<div class="divider-v"></div>`);
}

function renderCatNav(filtered){
  const nav=document.getElementById("catnav");
  nav.innerHTML=Object.keys(filtered).map(cat=>
    '<button class="cat-tab'+(cat===activeCat?' active':'')+'" role="tab" aria-selected="'+(cat===activeCat)+'" data-cat="'+esq(cat)+'">'+esc(cat)+'</button>'
  ).join('');
  if(!nav._bound){nav._bound=true;nav.addEventListener('click',e=>{const b=e.target.closest('[data-cat]');if(b)setCat(b.dataset.cat);});}
}
function renderSidebar(filtered){
  const nav=document.getElementById("subcatnav");
  if(!nav) return;
  const subs=filtered[activeCat]||{};
  nav.innerHTML=Object.keys(subs).map(sub=>
    '<button class="subcat-btn'+(sub===activeSub?' active':'')+'" role="tab" aria-selected="'+(sub===activeSub)+'" data-sub="'+esq(sub)+'" title="'+esc(sub)+'">'+esc(sub)+'</button>'
  ).join('')||'<span style="font-size:12px;color:var(--gray-4);">No results</span>';
  if(!nav._bound){nav._bound=true;nav.addEventListener('click',e=>{const b=e.target.closest('[data-sub]');if(b)setSub(b.dataset.sub);});}
}
function buildShotCard(code, shot, idx, isActive) {
  var hasImg  = !!(shot && shot.img);
  var label   = (shot && (shot.label || SHOT_LABELS[code])) || code;
  var desc    = (shot && shot.desc) || "";
  var req     = shot ? shot.required : (code !== "E1");
  var imgSrc  = hasImg ? esc(shot.img) : "";
  var codeQ   = esq(code);

  var imgTag = hasImg
    ? "<img src=\"" + imgSrc + "\" alt=\"" + esc(code) + "\" loading=\"lazy\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">"
    : "<div class=\"shot-empty-placeholder\">" + shotSVG(code) + "</div>";

  // In editMode: mostra overlay upload; altrimenti: click apre anteprima
  var overlay = editMode
    ? "<div class=\"shot-upload-hint\">"
      + "<svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M10 3v10M6 7l4-4 4 4\"/><path d=\"M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1\"/></svg>"
      + "<span>" + (hasImg ? "Replace" : "Upload image") + "</span>"
      + "</div>"
    : (hasImg
      ? "<div class=\"shot-preview-hint\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z\"/><circle cx=\"10\" cy=\"10\" r=\"2.5\"/></svg></div>"
      : "");

  var fileInput = editMode
    ? "<input type=\"file\" id=\"shot-file-" + esc(code) + "\" accept=\"image/*\" style=\"display:none\""
      + " onchange=\"handleShotFileUpload('" + codeQ + "',this)\">"
    : "";

  var clickFn = editMode
    ? "handleShotClick(event,'" + codeQ + "'," + idx + ")"
    : (hasImg ? "openPreview('" + codeQ + "')" : "toggleShot(" + idx + ")");

  var wrapCls = "shot-img-wrap" + (editMode ? " shot-upload-target" : (hasImg ? " shot-preview-target" : ""));

  var wrap = "<div class=\"" + wrapCls + "\" onclick=\"" + clickFn + "\">"
    + imgTag + overlay + fileInput + "</div>";

  var badgeCls = req ? "badge-req" : "badge-opt";
  var badgeTxt = req ? "Required"  : "Optional";
  var footer = "<div class=\"shot-footer\" onclick=\"toggleShot(" + idx + ")\">"
    + "<div class=\"shot-top\"><span class=\"shot-code\">" + esc(code) + "</span>"
    + "<span class=\"badge " + badgeCls + "\">" + badgeTxt + "</span></div>"
    + "<div class=\"shot-label\">" + esc(label) + "</div>"
    + "<div class=\"shot-desc\">" + esc(desc) + "</div>"
    + "</div>";

  return "<div class=\"shot-card" + (isActive ? " active" : "") + "\""
    + " data-code=\"" + esc(code) + "\" data-idx=\"" + idx + "\">"
    + wrap + footer + "</div>";
}

function buildShotsGrid(shotEntries){
  if(!shotEntries.length){
    var msg=editMode
      ?'No reference images yet — upload files in the Edit panel.'
      :'No reference images yet — click <strong>Edit</strong> to add them.';
    return '<div class="empty-state">'+msg+'</div>';
  }

  // Costruisce le card + inserisce detail inline dopo la card attiva
  // CSS grid-column: 1/-1 posiziona il detail in fondo alla riga corrente
  var result='';
  for(var i=0;i<shotEntries.length;i++){
    var code=shotEntries[i][0], shot=shotEntries[i][1];
    var isActive=(activeShot===i);
    result+=buildShotCard(code,shot,i,isActive);
    if(isActive){
      result+=buildDetailInline(shotEntries);
    }
  }
  return '<div class="shots-grid" id="shots-grid-main">'+result+'</div>';
}

function buildDetailInline(shotEntries){
  if(activeShot===null||!shotEntries[activeShot]) return '';
  const cur=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!cur) return '';
  const [code]=shotEntries[activeShot];
  const specs=Object.keys(cur.specs||{}).length?cur.specs:SHARED_DEFAULTS;
  const si=Object.entries(specs).map(([k,v])=>
    '<div><div class="dk">'+esc(k)+'</div><div class="dv">'+esc(v)+'</div></div>'
  ).join('');
  const dn=cur.brandNote
    ?'<div class="brand-diff"><strong>'+esc(BRANDS[activeBrand].label)+'</strong> — '+esc(cur.brandNote)+'</div>'
    :'';
  return '<div class="shot-detail-inline">'
    +'<div class="detail-hd">'+esc(activeSub)+' · '+esc(code.toUpperCase())+'</div>'
    +'<div class="detail-grid">'
    +(si||'<div style="color:var(--gray-4);font-size:12px;">No specs defined.</div>')
    +'</div>'+dn+'</div>';
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function esq(s){ return String(s||"").replace(/'/g,"\\'"); }

function getFiltered(){
  const src = DATA[activeBrand]||{};
  const q = searchQ.trim().toLowerCase();
  if(!q) return src;
  const out={};
  for(const [cat,subs] of Object.entries(src)){
    const m={};
    for(const [sub,d] of Object.entries(subs)){
      if(`${cat} ${sub} ${d.notes}`.toLowerCase().includes(q)) m[sub]=d;
    }
    if(Object.keys(m).length) out[cat]=m;
  }
  return out;
}

function ensureActive(filtered){
  if(filtered[activeCat]?.[activeSub]) return;
  activeCat  = Object.keys(filtered)[0]||activeCat;
  activeSub  = Object.keys(filtered[activeCat]||{})[0]||activeSub;
  activeShot = null;
}

function shotSVG(code){
  const icons={
    IN:`<svg width="40" height="54" viewBox="0 0 40 54" fill="none"><rect x="6" y="3" width="28" height="40" rx="2" stroke="var(--gray-4)" stroke-width="1"/><rect x="10" y="43" width="20" height="5" rx="1" fill="var(--gray-2)" stroke="var(--gray-3)" stroke-width=".7"/><circle cx="20" cy="21" r="4" fill="var(--gray-3)"/><text x="20" y="52" font-size="5.5" text-anchor="middle" fill="var(--gray-4)" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing=".1em">FRONT</text></svg>`,

function buildShotCard(code, shot, idx, isActive) {
  var hasImg  = !!(shot && shot.img);
  var label   = (shot && (shot.label || SHOT_LABELS[code])) || code;
  var desc    = (shot && shot.desc) || "";
  var req     = shot ? shot.required : (code !== "E1");
  var imgSrc  = hasImg ? esc(shot.img) : "";
  var codeQ   = esq(code);

  var imgTag = hasImg
    ? "<img src=\"" + imgSrc + "\" alt=\"" + esc(code) + "\" loading=\"lazy\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">"
    : "<div class=\"shot-empty-placeholder\">" + shotSVG(code) + "</div>";

  // In editMode: mostra overlay upload; altrimenti: click apre anteprima
  var overlay = editMode
    ? "<div class=\"shot-upload-hint\">"
      + "<svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M10 3v10M6 7l4-4 4 4\"/><path d=\"M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1\"/></svg>"
      + "<span>" + (hasImg ? "Replace" : "Upload image") + "</span>"
      + "</div>"
    : (hasImg
      ? "<div class=\"shot-preview-hint\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z\"/><circle cx=\"10\" cy=\"10\" r=\"2.5\"/></svg></div>"
      : "");

  var fileInput = editMode
    ? "<input type=\"file\" id=\"shot-file-" + esc(code) + "\" accept=\"image/*\" style=\"display:none\""
      + " onchange=\"handleShotFileUpload('" + codeQ + "',this)\">"
    : "";

  var clickFn = editMode
    ? "handleShotClick(event,'" + codeQ + "'," + idx + ")"
    : (hasImg ? "openPreview('" + codeQ + "')" : "toggleShot(" + idx + ")");

  var wrapCls = "shot-img-wrap" + (editMode ? " shot-upload-target" : (hasImg ? " shot-preview-target" : ""));

  var wrap = "<div class=\"" + wrapCls + "\" onclick=\"" + clickFn + "\">"
    + imgTag + overlay + fileInput + "</div>";

  var badgeCls = req ? "badge-req" : "badge-opt";
  var badgeTxt = req ? "Required"  : "Optional";
  var footer = "<div class=\"shot-footer\" onclick=\"toggleShot(" + idx + ")\">"
    + "<div class=\"shot-top\"><span class=\"shot-code\">" + esc(code) + "</span>"
    + "<span class=\"badge " + badgeCls + "\">" + badgeTxt + "</span></div>"
    + "<div class=\"shot-label\">" + esc(label) + "</div>"
    + "<div class=\"shot-desc\">" + esc(desc) + "</div>"
    + "</div>";

  return "<div class=\"shot-card" + (isActive ? " active" : "") + "\""
    + " data-code=\"" + esc(code) + "\" data-idx=\"" + idx + "\">"
    + wrap + footer + "</div>";
}

function buildShotsGrid(shotEntries) {
  if (!shotEntries.length) {
    return '<div class="empty-state">No reference images yet — click a shot to add one.</div>';
  }
  var cards = shotEntries.map(function(entry, idx) {
    var code = entry[0], shot = entry[1];
    return buildShotCard(code, shot, idx, activeShot === idx);
  }).join("");

return '<div class="shots-grid" id="shots-grid-main">' + cards + '</div>';
}

function renderMain(filtered){
  const main=document.getElementById("main");
  const cur=filtered[activeCat]?.[activeSub];
  if(!cur){
    const q=searchQ.trim();
    const allSubs=Object.values(DATA[activeBrand]||{}).flatMap(c=>Object.keys(c));
    const sug=allSubs.filter(s=>s.toLowerCase().includes(q.toLowerCase().split(' ')[0])).slice(0,3);
    const sugH=sug.length?'<div class="empty-suggest">Try: '+sug.map(s=>'<button class="empty-suggest-btn" data-sub="'+esq(s)+'">'+esc(s)+'</button>').join('')+'</div>':'';
    main.innerHTML='<div class="empty-state"><div class="empty-query">“'+esc(q)+'”</div><div class="empty-msg">No results — try a different term.</div>'+sugH+'</div>';
    main.querySelector('.empty-state')?.addEventListener('click',e=>{
      const b=e.target.closest('[data-sub]');
      if(b){searchQ='';document.getElementById('searchInput').value='';setSub(b.dataset.sub);}
    });
    return;
  }
  const shots=cur.shots||{},specs=Object.keys(cur.specs||{}).length?cur.specs:SHARED_DEFAULTS;
  const se=Object.entries(shots);
  const specsHTML='<div class="specs-strip">'+Object.entries(specs).map(([k,v])=>
    '<div class="spec-item"><div class="spec-key">'+esc(k)+'</div><div class="spec-val">'+esc(v)+'</div></div>'
  ).join('')+'</div>';
  const notes=cur.notes?'<p class="prod-notes-inline">'+esc(cur.notes)+'</p>':'';
  main.innerHTML=
    '<div class="context-bar"><div class="prod-category">'+esc(activeCat)+'</div><div class="prod-title">'+esc(activeSub)+'</div></div>'
    +notes+specsHTML
    +buildShotsGrid(se)
    +buildCropSection(cur);
  main.querySelectorAll('.shot-img-wrap img').forEach(img=>{
    img.onerror=()=>{const c=img.closest('[data-code]')?.dataset.code||'';const w=img.closest('.shot-img-wrap');if(w)w.innerHTML=shotSVG(c);};
    if(img.dataset.src&&_imgObserver)_imgObserver.observe(img);
  });
  // Binding crop slots
  setTimeout(()=>{
    main.querySelectorAll('input[data-crop]').forEach(inp=>{
      inp.onchange=()=>{
        const i=parseInt(inp.dataset.crop);
        const file=inp.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=e=>{
          const cur=DATA[activeBrand]?.[activeCat]?.[activeSub];
          if(cur&&cur.cropSlots&&cur.cropSlots[i]){
            cur.cropSlots[i].img=e.target.result;
            setUnsaved(true); render();
          }
        };
        reader.readAsDataURL(file);
      };
      inp.closest('.shot-upload-target')?.addEventListener('click',()=>inp.click());
    });
    main.querySelectorAll('.crop-remove-btn').forEach(btn=>{
      btn.onclick=(e)=>{
        e.stopPropagation();
        const i=parseInt(btn.dataset.cropIdx);
        const cur=DATA[activeBrand]?.[activeCat]?.[activeSub];
        if(cur&&cur.cropSlots){ cur.cropSlots.splice(i,1); setUnsaved(true); render(); }
      };
    });
  },0);
}

function buildCropSection(cur){
  var cropSlots=cur.cropSlots||[];
  var hdr='<div class="crop-section-header">'
    +'<span class="crop-section-title">Crop References</span>'
    +(editMode?'<button class="crop-add-btn" onclick="addCropSlot()">+ Add</button>':'')
    +'</div>';
  if(!cropSlots.length){
    if(editMode){
      return '<div class="crop-section">'+hdr
        +'<div class="crop-empty" onclick="addCropSlot()">'
        +'Upload crop references — details, packaging, colour variants…'
        +'</div></div>';
    }
    return ''; // hidden in read mode if empty
  }
  // In read mode: show only slots that have an image
  var visibleSlots = editMode ? cropSlots : cropSlots.filter(function(s){ return !!s.img; });
  if(!visibleSlots.length) return '';
  var cards=visibleSlots.map((slot,i)=>{
    var origIdx = editMode ? i : cropSlots.indexOf(slot);
    var hasImg=!!(slot.img);
    var imgHTML=hasImg
      ?'<img src="'+esc(slot.img)+'" alt="'+esc(slot.label||'Reference')+'" style="width:100%;height:100%;object-fit:cover;display:block;">'
      :'<div class="shot-empty-placeholder">'+shotSVG('CU')+'</div>';
    var uploadHint=editMode?'<div class="shot-upload-hint"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3v10M6 7l4-4 4 4"/><path d="M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1"/></svg><span>'+(hasImg?'Replace':'Upload')+'</span></div>':
      (hasImg?'<div class="shot-preview-hint"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/></svg></div>':'');
    var clickFn=editMode?'':'('+(hasImg?'function(){var o=document.getElementById("previewOverlay");var im=document.getElementById("previewImg");if(o&&im){im.src="'+esc(slot.img)+'";o.style.display="flex";}}'  :'null')+')()';
    return '<div class="shot-card" data-crop-idx="'+origIdx+'">'
      +'<div class="shot-img-wrap'+(editMode?' shot-upload-target':(hasImg?' shot-preview-target':''))+'"'
      +((!editMode&&hasImg)?' onclick="var o=document.getElementById(\'previewOverlay\'),im=document.getElementById(\'previewImg\');if(o&&im){im.src=\''+esq(slot.img)+'\';o.style.display=\'flex\';}"':'')+'>'
      +imgHTML+uploadHint
      +'<input type="file" id="crop-file-'+origIdx+'" data-crop="'+origIdx+'" accept="image/*" style="display:none">'
      +'</div>'
      +'<div class="shot-footer">'
        +'<div class="shot-top"><span class="shot-code">'+esc(slot.label||('REF '+(origIdx+1)))+'</span>'
        +(editMode?'<button class="crop-remove-btn" data-crop-idx="'+origIdx+'">×</button>':'')
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
  return '<div class="crop-section">'+hdr+'<div class="crop-grid">'+cards+'</div></div>';
}

function addCropSlot(){
  const cur=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!cur) return;
  if(!cur.cropSlots) cur.cropSlots=[];
  cur.cropSlots.push({label:'',img:''});
  setUnsaved(true);
  render();
  // Apri subito file picker sull'ultimo slot
  setTimeout(()=>{
    const idx=cur.cropSlots.length-1;
    document.getElementById('crop-file-'+idx)?.click();
  },50);
}

function buildShotsGrid(shotEntries){
  if(!shotEntries.length){
    var msg=editMode
      ?'No reference images yet — upload files in the Edit panel.'
      :'No reference images yet — click <strong>Edit</strong> to add them.';
    return '<div class="empty-state">'+msg+'</div>';
  }

  // Costruisce le card + inserisce detail inline dopo la card attiva
  // CSS grid-column: 1/-1 posiziona il detail in fondo alla riga corrente
  var result='';
  for(var i=0;i<shotEntries.length;i++){
    var code=shotEntries[i][0], shot=shotEntries[i][1];
    var isActive=(activeShot===i);
    result+=buildShotCard(code,shot,i,isActive);
    if(isActive){
      result+=buildDetailInline(shotEntries);
    }
  }
  return '<div class="shots-grid" id="shots-grid-main">'+result+'</div>';
}

function buildDetailInline(shotEntries){
  if(activeShot===null||!shotEntries[activeShot]) return '';
  const cur=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!cur) return '';
  const [code]=shotEntries[activeShot];
  const specs=Object.keys(cur.specs||{}).length?cur.specs:SHARED_DEFAULTS;
  const si=Object.entries(specs).map(([k,v])=>
    '<div><div class="dk">'+esc(k)+'</div><div class="dv">'+esc(v)+'</div></div>'
  ).join('');
  const dn=cur.brandNote
    ?'<div class="brand-diff"><strong>'+esc(BRANDS[activeBrand].label)+'</strong> — '+esc(cur.brandNote)+'</div>'
    :'';
  return '<div class="shot-detail-inline">'
    +'<div class="detail-hd">'+esc(activeSub)+' · '+esc(code.toUpperCase())+'</div>'
    +'<div class="detail-grid">'
    +(si||'<div style="color:var(--gray-4);font-size:12px;">No specs defined.</div>')
    +'</div>'+dn+'</div>';
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function esq(s){ return String(s||"").replace(/'/g,"\\'"); }

function getFiltered(){
  const src = DATA[activeBrand]||{};
  const q = searchQ.trim().toLowerCase();
  if(!q) return src;
  const out={};
  for(const [cat,subs] of Object.entries(src)){
    const m={};
    for(const [sub,d] of Object.entries(subs)){
      if(`${cat} ${sub} ${d.notes}`.toLowerCase().includes(q)) m[sub]=d;
    }
    if(Object.keys(m).length) out[cat]=m;
  }
  return out;
}

    return '<div class="empty-state">No reference images yet — click a shot to add one.</div>';
  }
  var cards = shotEntries.map(function(entry, idx) {
    var code = entry[0], shot = entry[1];
    return buildShotCard(code, shot, idx, activeShot === idx);
  }).join("");

return '<div class="shots-grid" id="shots-grid-main">' + cards + '</div>';
}

function renderMain(filtered){
  const main=document.getElementById("main");
  const cur=filtered[activeCat]?.[activeSub];
  if(!cur){
    const q=searchQ.trim();
    const allSubs=Object.values(DATA[activeBrand]||{}).flatMap(cat=>Object.keys(cat));
    const suggestions=allSubs.filter(s=>s.toLowerCase().includes(q.toLowerCase().split(' ')[0])).slice(0,3);
    const suggHTML=suggestions.length
      ?'<div class="empty-suggest">Try: '+suggestions.map(s=>
          '<button class="empty-suggest-btn" data-sub="'+esq(s)+'">'+esc(s)+'</button>'
        ).join('')+'</div>'
      :'';
    main.innerHTML='<div class="empty-state">'
      +'<div class="empty-query">“'+esc(q)+'”</div>'
      +'<div class="empty-msg">No results — try a different term.</div>'
      +suggHTML
      +'</div>';
    // Event delegation per i suggerimenti
    main.querySelector('.empty-state')?.addEventListener('click',e=>{
      const b=e.target.closest('[data-sub]');
      if(b){
        searchQ='';
        document.getElementById('searchInput').value='';
        var _hi=document.getElementById('heroSearchInput');if(_hi)_hi.value='';
        setSub(b.dataset.sub);
      }
    });
    return;
  }
  const shots=cur.shots||{},specs=Object.keys(cur.specs||{}).length?cur.specs:SHARED_DEFAULTS;
  const se=Object.entries(shots);
  const specsHTML='<div class="specs-strip">'+Object.entries(specs).map(([k,v])=>
    '<div class="spec-item"><div class="spec-key">'+esc(k)+'</div><div class="spec-val">'+esc(v)+'</div></div>'
  ).join('')+'</div>';
  const shotsHTML=buildShotsGrid(se);
  const notes=cur.notes?'<p class="prod-notes-inline">'+esc(cur.notes)+'</p>':'';
  main.innerHTML='<div class="context-bar"><div class="prod-title">'+esc(activeSub)+'</div></div>'+notes+specsHTML+shotsHTML;
  main.querySelectorAll('.shot-img-wrap img').forEach(img=>{
    img.onerror=()=>{const c=img.closest('[data-code]')?.dataset.code||'';const w=img.closest('.shot-img-wrap');if(w)w.innerHTML=shotSVG(c);};
    if(img.dataset.src && _imgObserver) _imgObserver.observe(img);
  });
}
function render(){
  const f=getFiltered();ensureActive(f);
  const bC=activeBrand!==_lB,cC=activeCat!==_lC,sC=activeSub!==_lS,eC=editMode!==_lE,qC=searchQ!==_lQ;
  if(bC||qC)renderBrandSwitch();
  if(bC||cC||qC)renderCatNav(f);
  if(bC||cC||qC)renderSidebar(f);
  if(bC||cC||sC||eC||qC)renderMain(f);
  if(editMode&&(bC||cC||sC))buildAdminForm();
  _lB=activeBrand;_lC=activeCat;_lS=activeSub;_lE=editMode;_lQ=searchQ;
  renderHero();
}
function openAdmin(){
  adminOpen=true;
  document.getElementById("adminBtn").classList.add("active");
  const overlay=document.getElementById("adminOverlay");
  overlay.classList.add("open");
  buildAdminForm();
}

function closeAdmin(){
  adminOpen=false;
  document.getElementById("adminBtn").classList.remove("active");
  document.getElementById("adminOverlay").classList.remove("open");
}

function buildAdminForm(){
  const current=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!current){ document.getElementById("adminBody").innerHTML=`<div style="color:var(--gray-4);font-size:12px;">Select a product to edit it.</div>`; return; }

  const specs=current.specs||{};
  const specFields=["Lighting","Retouching","Format"].map(k=>`
    <div class="admin-field">
      <label>${k}</label>
      <input type="text" id="spec_${k}" value="${esc(specs[k]||"")}" placeholder="${k}…">
    </div>
  `).join("");

  const shotCards=SHOT_ORDER.map(code=>{
    const shot=current.shots?.[code]||{required:code!=="E1",img:"",desc:"",label:SHOT_LABELS[code]};
    const hasImg = !!(shot.img && shot.img.startsWith("data:"));
    const imgSrc = hasImg ? esc(shot.img) : "";
    const lbl    = shot.label || SHOT_LABELS[code] || code;

    // Costruisce area media senza NESSUN handler inline (tutti via addEventListener nel setTimeout)
    const mediaArea = hasImg
      ? '<div class="admin-img-preview-wrap" data-preview="'+code+'">'
          + '<img class="img-preview-lg" id="prev_'+code+'" src="'+imgSrc+'" alt="">'
          + '<div class="admin-preview-overlay">'
          + '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">'
          + '<path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/>'
          + '<circle cx="10" cy="10" r="2.5"/></svg>'
          + '</div></div>'
          + '<button class="btn-replace-img" data-upload="'+code+'">'
          + '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">'
          + '<path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2M8 2v8M5 5l3-3 3 3"/></svg>'
          + 'Replace image</button>'
          + '<input type="file" id="file_'+code+'" data-code="'+code+'" accept="image/*" style="display:none">'
      : '<div class="upload-zone" id="zone_'+code+'" data-code="'+code+'">'
          + '<div class="img-placeholder-lg">'
          + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">'
          + '<rect x="3" y="4" width="18" height="16" rx="2"/>'
          + '<circle cx="8.5" cy="9.5" r="1.5"/>'
          + '<path d="M3 15l5-5 4 4 3-3 4 4"/></svg>'
          + '<span>No image</span></div>'
          + '<div class="upload-zone-overlay">'
          + '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">'
          + '<path d="M10 3v10M6 7l4-4 4 4"/>'
          + '<path d="M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1"/></svg>'
          + '<span>Upload image</span>'
          + '<small>Drag here or click · JPG PNG</small>'
          + '</div>'
          + '<input type="file" id="file_'+code+'" data-code="'+code+'" accept="image/*" style="display:none">'
          + '</div>';


    return '<div class="shot-admin-card">'
      + '<div class="shot-admin-head">'
        + '<span class="shot-admin-code">'+esc(code)+'</span>'
        + '<span class="shot-admin-label">'+esc(lbl)+'</span>'
        + '<label class="shot-req-toggle">'
          + '<input type="checkbox" id="req_'+code+'" '+(shot.required?'checked':'')+'>'
          + 'Required'
        + '</label>'
      + '</div>'
      + '<div class="shot-admin-body">'
        + '<div class="admin-field"><label>Description</label>'
          + '<input type="text" id="desc_'+code+'" value="'+esc(shot.desc||'')+'" placeholder="Shot description…">'
        + '</div>'
        + mediaArea
        + '<div class="img-embed-status" id="status_'+code+'">'
          + (hasImg ? '<span class="status-ok">✓ Incorporata nel file</span>' : '')
        + '</div>'
      + '</div>'
    + '</div>';
  }).join("");

  document.getElementById("adminTitle").textContent = `${activeSub} — ${BRANDS[activeBrand].label}`;
  setTimeout(()=>{
    // Zone upload: click apre file picker
    document.querySelectorAll('.upload-zone[data-code]').forEach(zone=>{
      const c = zone.dataset.code;
      zone.onclick = ()=>document.getElementById('file_'+c)?.click();
      zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', ()=>zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e=>{
        e.preventDefault(); zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if(file && file.type.startsWith('image/')) {
          const r = new FileReader();
          r.onload = ev=>{ handleFileUpload(c, {files:[file]}); };
          // usa direttamente handleDrop logic
          handleDropData(c, file);
        }
      });
    });
    // Input file: onChange
    document.querySelectorAll('input[type="file"][data-code]').forEach(input=>{
      input.onchange = ()=>handleFileUpload(input.dataset.code, input);
    });
    // Preview click
    document.querySelectorAll('[data-preview]').forEach(el=>{
      el.onclick = ()=>openPreview(el.dataset.preview);
    });
    // Replace
    document.querySelectorAll('[data-upload]').forEach(el=>{
      el.onclick = ()=>document.getElementById('file_'+el.dataset.upload)?.click();
    });
    // Bulk upload
    const bulk = document.getElementById('bulk-upload');
    if(bulk && !bulk._bound) { bulk._bound=true; bulk.onchange = ()=>handleBulkUpload(bulk); }
  },0);

  document.getElementById("adminBody").innerHTML=`
    <div>
      <div class="admin-section-title">Notes</div>
      <div class="admin-field">
        <textarea id="admin_notes" rows="3">${esc(current.notes||"")}</textarea>
      </div>
    </div>
    <div class="admin-divider"></div>
    <div>
      <div class="admin-section-title">Technical specs</div>
      ${specFields}
    </div>
    <div class="admin-divider"></div>
    <div>
      <div class="admin-section-title">Brand note</div>
      <div class="admin-field">
        <textarea id="admin_brandNote" rows="2">${esc(current.brandNote||"")}</textarea>
      </div>
    </div>
    <div class="admin-divider"></div>
    <div>
      <div class="admin-section-title">Shot reference</div>
      <div class="bulk-upload-bar" style="margin-bottom:14px;">
        <input type="file" id="bulk-upload" accept="image/*" multiple style="display:none" onchange="handleBulkUpload(this)">
        <button class="bulk-btn" onclick="document.getElementById('bulk-upload').click()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2M8 2v8M5 5l3-3 3 3"/></svg>
          Upload IN · BK · CU · E1 together
        </button>
        <span class="bulk-hint">Multiple files in order → assigned to shots</span>
      </div>
      <div class="shots-admin">${shotCards}</div>
    </div>
  `;
}

function handleFileUpload(code, input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result;
    updateUploadZone(code,b64);
  };
  reader.readAsDataURL(file);
}

function handleDropData(code, file){
  const reader = new FileReader();
  reader.onload = e=>{ updateUploadZone(code, e.target.result); saveImgToData(code, e.target.result); render(); buildAdminForm(); };
  reader.readAsDataURL(file);
}

function handleDrop(code, evt){
  evt.preventDefault();
  document.getElementById('zone_'+code).classList.remove('drag-over');
  const file=evt.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/')) return;
  const reader=new FileReader();
  reader.onload=e=>updateUploadZone(code,e.target.result);
  reader.readAsDataURL(file);
}

function updateUploadZone(code, b64){
  const zone=document.getElementById('zone_'+code);
  if(!zone) return;
  // Aggiorna preview dentro la zona
  let preview=zone.querySelector('.img-preview-lg');
  if(!preview){
    const placeholder=zone.querySelector('.img-placeholder-lg');
    preview=document.createElement('img');
    preview.className="img-preview-lg";
    preview.alt="";
    if(placeholder) placeholder.replaceWith(preview);
    else zone.insertBefore(preview,zone.querySelector('.upload-zone-overlay'));
  }
  preview.src=b64;
  preview.id='prev_'+code;
  // Aggiorna testo overlay
  const overlaySpan=zone.querySelector('.upload-zone-overlay span');
  if(overlaySpan) overlaySpan.textContent='Replace image';
  // Trigger click sulla zona apre file picker
  zone.onclick=()=>document.getElementById('file_'+code).click();
  // Aggiorna status
  const status=document.getElementById('status_'+code);
  if(status) status.innerHTML='<span class="status-ok">✓ Incorporata nel file</span>';
  // Salva in un campo hidden per il saveAdmin
  let hidden=document.getElementById('img_'+code);
  if(!hidden){
    hidden=document.createElement('input');
    hidden.type='hidden'; hidden.id='img_'+code;
    zone.appendChild(hidden);
  }
  hidden.value=b64;
}

function updatePreview(code,url){
  if(url && url.startsWith('data:')) updateUploadZone(code,url);
}

function saveAdmin(){
  const current=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!current) return;
  const specs={};
  ['Lighting','Retouching','Format'].forEach(k=>{
    const v=document.getElementById('spec_'+k)?.value||'';
    if(v) specs[k]=v;
  });
  current.specs=specs;
  current.notes=document.getElementById('admin_notes')?.value||'';
  current.brandNote=document.getElementById('admin_brandNote')?.value||'';
  SHOT_ORDER.forEach(code=>{
    if(!current.shots) current.shots={};
    if(!current.shots[code]) current.shots[code]={label:SHOT_LABELS[code]||code,required:false,img:'',desc:''};
    current.shots[code].required=document.getElementById('req_'+code)?.checked||false;
    current.shots[code].desc=document.getElementById('desc_'+code)?.value||'';
    current.shots[code].img=document.getElementById('img_'+code)?.value||current.shots[code].img||'';
    current.shots[code].label=SHOT_LABELS[code];
  });
  const status=document.getElementById('saveStatus');
  status.textContent='Applied';
  setUnsaved(true);
  setTimeout(()=>status.textContent='',2500);
  render();
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.json';
  a.click();
  setUnsaved(false);
  const st=document.getElementById('saveStatus');
  if(st){st.textContent='Exported ✓';setTimeout(()=>st.textContent='',2500);}
}
function setBrand(b){ activeBrand=b; const f=getFiltered(); ensureActive(f); activeShot=null; render(); if(adminOpen) buildAdminForm(); }
function setCat(c){ activeCat=c; activeSub=Object.keys(DATA[activeBrand]?.[c]||{})[0]||""; activeShot=null; render(); if(adminOpen) buildAdminForm(); }
function setSub(s){ activeSub=s; activeShot=null; render(); if(adminOpen) buildAdminForm(); }
var editMode = false;

function setEditMode(on) {
  editMode = on;
  var btn = document.getElementById("adminBtn");
  if (btn) btn.classList.toggle("active", on);
  render();
  if (on) openAdmin();
  else closeAdmin();
}

function handleShotClick(evt, code, idx){
  evt.stopPropagation();
  if (editMode) document.getElementById("shot-file-"+code)?.click();
}

function openPreview(code) {
  var current = DATA[activeBrand]?.[activeCat]?.[activeSub];
  if (!current || !current.shots || !current.shots[code]) return;
  var img = current.shots[code].img;
  if (!img) return;
  var overlay = document.getElementById("previewOverlay");
  var imgEl   = document.getElementById("previewImg");
  if (!overlay || !imgEl) return;
  imgEl.src = img;
  overlay.style.display = "flex";
  document.getElementById("previewLabel").textContent =
    (current.shots[code].label || code) + " — " + activeSub;
}

function closePreview() {
  var overlay = document.getElementById("previewOverlay");
  if (overlay) overlay.style.display = "none";
}

function handleShotFileUpload(code, input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    saveImgToData(code, e.target.result);
    render();
  };
  reader.readAsDataURL(file);
}

function handleBulkUpload(input){
  const files=Array.from(input.files);
  if(!files.length) return;
  const current=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!current) return;
  const codes=Object.keys(current.shots||{});
  let loaded=0;
  files.forEach((file,i)=>{
    if(i>=codes.length) return;
    const code=codes[i];
    const reader=new FileReader();
    reader.onload=e=>{
      saveImgToData(code,e.target.result);
      loaded++;
      if(loaded===Math.min(files.length,codes.length)) render();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

var _hasUnsaved=false;
function setUnsaved(v){
  _hasUnsaved=v;
  const b=document.getElementById('unsavedBadge');
  if(b)b.classList.toggle('visible',v);
}

function saveImgToData(code, b64){
  const current=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!current) return;
  if(!current.shots) current.shots={};
  if(!current.shots[code]) current.shots[code]={label:SHOT_LABELS[code]||code,required:code!=='E1',img:'',desc:''};
  current.shots[code].img=b64;
  setUnsaved(true);
}
function toggleShot(i){ activeShot=activeShot===i?null:i; render(); }

document.getElementById("adminOverlay").addEventListener("click", function(e){ if(e.target===this) closeAdmin(); });

var _heroDismissed = false;

function dismissHero(){
  _heroDismissed = true;
  var hero = document.getElementById('searchHero');
  if(hero){
    hero.style.transition = 'opacity .18s';
    hero.style.opacity = '0';
    hero.style.pointerEvents = 'none';
    setTimeout(function(){ hero.style.display = 'none'; }, 180);
  }
  var si = document.getElementById('searchInput');
  if(si){ si.value = searchQ; si.focus(); }
}

function renderHero(){
  if(_heroDismissed) return;
  var hero = document.getElementById('searchHero');
  if(hero) hero.style.display = 'flex';
}

var _imgObserver = typeof IntersectionObserver !== 'undefined'
  ? new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          const img=e.target;
          if(img.dataset.src){ img.src=img.dataset.src; delete img.dataset.src; }
          _imgObserver.unobserve(img);
        }
      });
    }, {rootMargin:'100px'})
  : null;

function lazyImg(src, alt, style){
  const isB64 = src.startsWith('data:');
  if(isB64 || !_imgObserver){
    return '<img src="'+src+'" alt="'+alt+'" style="'+style+'">';
  }
  return '<img data-src="'+src+'" alt="'+alt+'" style="'+style+'" src="" class="lazy-img">';
}

document.getElementById("searchInput").addEventListener("input", function(e){
  if(!DATA_LOADED) return;
  searchQ = e.target.value;
  activeShot = null;
  render();
});
document.getElementById("searchInput").addEventListener("keydown", function(e){
  if(e.key==="Escape"){ searchQ=''; document.getElementById('searchInput').value=''; render(); }
});

(function(){
  var hi = document.getElementById('heroSearchInput');
  if(!hi) return;
  hi.addEventListener('input', function(){
    if(!DATA_LOADED) return;
    searchQ = hi.value;
    var si = document.getElementById('searchInput');
    if(si) si.value = searchQ;
    activeShot = null;
    render();
  });
  hi.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){
      searchQ = ''; hi.value = '';
      var si = document.getElementById('searchInput'); if(si) si.value = '';
      render();
    }
    if(e.key === 'Enter' && searchQ.trim().length > 0){ dismissHero(); }
  });
  setTimeout(function(){ hi.focus(); }, 80);
})();

loadData();
</script>
</body>
</html>
