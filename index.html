  document.getElementById('tabShots').classList.toggle('active', tab==='shots');
  document.getElementById('tabStruct').classList.toggle('active', tab==='structure');
  if(tab==='shots') buildAdminForm();
  else buildStructurePanel();
}

function buildStructurePanel(){
  const brand = DATA[activeBrand]||{};
  const body = document.getElementById('adminBody');

  // ── Categories list ──────────────────────────
  const catsHTML = Object.keys(brand).map(cat=>{
    const isCurrent = cat===activeCat;
    const isDisabled = !!(brand[cat]?._disabled);
    return '<div class="struct-item'+(isCurrent?' current':'')+(isDisabled?' disabled':'')+'" data-cat="'+esc(cat)+'">'
      +'<span class="struct-item-name">'+esc(cat)+'</span>'
      +'<div class="struct-item-actions">'
        +'<button class="struct-btn" data-rename-cat="'+esc(cat)+'">Rename</button>'
        +'<button class="struct-btn" data-toggle-cat="'+esc(cat)+'">'+(isDisabled?'Enable':'Disable')+'</button>'
      +'</div>'
    +'</div>';
  }).join('');

  // ── Subcategories of current category ────────
  const subs = brand[activeCat]||{};
  const subsHTML = Object.keys(subs).filter(k=>k!=='_disabled').map(sub=>{
    const isCurrent = sub===activeSub;
    const isDisabled = !!(subs[sub]?._disabled);
    return '<div class="struct-item'+(isCurrent?' current':'')+(isDisabled?' disabled':'')+'" data-sub="'+esc(sub)+'">'
      +'<span class="struct-item-name">'+esc(sub)+'</span>'
      +'<div class="struct-item-actions">'
        +'<button class="struct-btn" data-rename-sub="'+esc(sub)+'">Rename</button>'
        +'<button class="struct-btn" data-toggle-sub="'+esc(sub)+'">'+(isDisabled?'Enable':'Disable')+'</button>'
        +'<button class="struct-btn danger" data-delete-sub="'+esc(sub)+'">Delete</button>'
      +'</div>'
    +'</div>';
  }).join('');

  body.innerHTML =
    '<div>'
      +'<div class="admin-section-title">Categories — '+esc(activeBrand)+'</div>'
      +'<div class="struct-section" id="structCats">'+catsHTML+'</div>'
      +'<div class="struct-add-row" style="margin-top:10px;">'
        +'<input id="newCatInput" placeholder="New category name…" type="text">'
        +'<button onclick="structAddCat()">Add</button>'
      +'</div>'
    +'</div>'
    +'<div class="admin-divider"></div>'
    +'<div>'
      +'<div class="admin-section-title">Subcategories — '+esc(activeCat)+'</div>'
      +'<div class="struct-section" id="structSubs">'+subsHTML+'</div>'
      +'<div class="struct-add-row" style="margin-top:10px;">'
        +'<input id="newSubInput" placeholder="New subcategory name…" type="text">'
        +'<button onclick="structAddSub()">Add</button>'
      +'</div>'
    +'</div>';

  // Event handlers
  setTimeout(()=>{
    // Rename category
    body.querySelectorAll('[data-rename-cat]').forEach(btn=>{
      btn.onclick=()=>{
        const old=btn.dataset.renameCat;
        const n=prompt('Rename category "'+old+'" to:',old);
        if(!n||n===old) return;
        structRenameCat(old,n);
      };
    });
    // Toggle category
    body.querySelectorAll('[data-toggle-cat]').forEach(btn=>{
      btn.onclick=()=>{ structToggleCat(btn.dataset.toggleCat); };
    });
    // Rename subcategory
    body.querySelectorAll('[data-rename-sub]').forEach(btn=>{
      btn.onclick=()=>{
        const old=btn.dataset.renameSub;
        const n=prompt('Rename subcategory "'+old+'" to:',old);
        if(!n||n===old) return;
        structRenameSub(old,n);
      };
    });
    // Toggle subcategory
    body.querySelectorAll('[data-toggle-sub]').forEach(btn=>{
      btn.onclick=()=>{ structToggleSub(btn.dataset.toggleSub); };
    });
    // Delete subcategory
    body.querySelectorAll('[data-delete-sub]').forEach(btn=>{
      btn.onclick=()=>{
        const sub=btn.dataset.deleteSub;
        if(!confirm('Delete "'+sub+'" permanently? This cannot be undone.')) return;
        structDeleteSub(sub);
      };
    });
    // Click category to select
    body.querySelectorAll('[data-cat]').forEach(el=>{
      el.addEventListener('click',function(e){
        if(e.target.closest('button')) return;
        setCat(this.dataset.cat);
        buildStructurePanel();
      });
    });
    // Click subcategory to select
    body.querySelectorAll('[data-sub]').forEach(el=>{
      el.addEventListener('click',function(e){
        if(e.target.closest('button')) return;
        setSub(this.dataset.sub);
        buildStructurePanel();
      });
    });
    // Enter key on inputs
    document.getElementById('newCatInput')?.addEventListener('keydown',e=>{ if(e.key==='Enter') structAddCat(); });
    document.getElementById('newSubInput')?.addEventListener('keydown',e=>{ if(e.key==='Enter') structAddSub(); });
  },0);
}

function structRenameCat(oldName, newName){
  const brand=DATA[activeBrand];
  if(!brand||brand[newName]) return;
  brand[newName]=brand[oldName];
  delete brand[oldName];
  if(activeCat===oldName) activeCat=newName;
  setUnsaved(true); render(); buildStructurePanel();
}
function structToggleCat(cat){
  const brand=DATA[activeBrand];
  if(!brand||!brand[cat]) return;
  brand[cat]._disabled = !brand[cat]._disabled;
  setUnsaved(true); render(); buildStructurePanel();
}
function structAddCat(){
  const inp=document.getElementById('newCatInput');
  const name=(inp?.value||'').trim();
  if(!name) return;
  const brand=DATA[activeBrand];
  if(brand[name]){ alert('Category "'+name+'" already exists.'); return; }
  brand[name]={};
  inp.value='';
  setUnsaved(true); render(); buildStructurePanel();
}
function structRenameSub(oldName, newName){
  const cat=DATA[activeBrand]?.[activeCat];
  if(!cat||cat[newName]) return;
  cat[newName]=cat[oldName];
  delete cat[oldName];
  if(activeSub===oldName) activeSub=newName;
  setUnsaved(true); render(); buildStructurePanel();
}
function structToggleSub(sub){
  const cat=DATA[activeBrand]?.[activeCat];
  if(!cat||!cat[sub]) return;
  cat[sub]._disabled = !cat[sub]._disabled;
  setUnsaved(true); render(); buildStructurePanel();
}
function structDeleteSub(sub){
  const cat=DATA[activeBrand]?.[activeCat];
  if(!cat||!cat[sub]) return;
  delete cat[sub];
  if(activeSub===sub) activeSub=Object.keys(cat).filter(k=>k!=='_disabled')[0]||'';
  setUnsaved(true); render(); buildStructurePanel();
}
function structAddSub(){
  const inp=document.getElementById('newSubInput');
  const name=(inp?.value||'').trim();
  if(!name) return;
  const cat=DATA[activeBrand]?.[activeCat];
  if(!cat){ alert('Select a category first.'); return; }
  if(cat[name]){ alert('Subcategory "'+name+'" already exists.'); return; }
  cat[name]={notes:'',specs:{"Format":"JPG Full size — 3000 × 4000 px · sRGB"},shots:{IN:{label:'Front',required:true,img:'',desc:''},BK:{label:'Back',required:true,img:'',desc:''},CU:{label:'Detail',required:true,img:'',desc:''},E1:{label:'Extra',required:false,img:'',desc:''}},brandNote:''};
  inp.value='';
  setUnsaved(true); render(); buildStructurePanel();
}

function handleFileUpload(code, input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result;
    updateUploadZone(code,b64);
  };
  reader.readAsDataURL(file);
}

function handleDropData(code, file){
  const reader = new FileReader();
  reader.onload = e=>{ updateUploadZone(code, e.target.result); saveImgToData(code, e.target.result); render(); buildAdminForm(); };
  reader.readAsDataURL(file);
}

function handleDrop(code, evt){
  evt.preventDefault();
  document.getElementById('zone_'+code).classList.remove('drag-over');
  const file=evt.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/')) return;
  const reader=new FileReader();
  reader.onload=e=>updateUploadZone(code,e.target.result);
  reader.readAsDataURL(file);
}

function updateUploadZone(code, b64){
  const zone=document.getElementById('zone_'+code);
  if(!zone) return;
  // Aggiorna preview dentro la zona
  let preview=zone.querySelector('.img-preview-lg');
  if(!preview){
    const placeholder=zone.querySelector('.img-placeholder-lg');
    preview=document.createElement('img');
    preview.className="img-preview-lg";
    preview.alt="";
    if(placeholder) placeholder.replaceWith(preview);
    else zone.insertBefore(preview,zone.querySelector('.upload-zone-overlay'));
  }
  preview.src=b64;
  preview.id='prev_'+code;
  // Aggiorna testo overlay
  const overlaySpan=zone.querySelector('.upload-zone-overlay span');
  if(overlaySpan) overlaySpan.textContent='Replace image';
  // Trigger click sulla zona apre file picker
  zone.onclick=()=>document.getElementById('file_'+code).click();
  // Aggiorna status
  const status=document.getElementById('status_'+code);
  if(status) status.innerHTML='<span class="status-ok">✓ Incorporata nel file</span>';
  // Salva in un campo hidden per il saveAdmin
  let hidden=document.getElementById('img_'+code);
  if(!hidden){
    hidden=document.createElement('input');
    hidden.type='hidden'; hidden.id='img_'+code;
    zone.appendChild(hidden);
  }
  hidden.value=b64;
}

function updatePreview(code,url){
  if(url && url.startsWith('data:')) updateUploadZone(code,url);
}

function saveAdmin(){
  const current=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!current) return;
  const specs={};
  ['Lighting','Retouching','Format'].forEach(k=>{
    const v=document.getElementById('spec_'+k)?.value||'';
    if(v) specs[k]=v;
  });
  current.specs=specs;
  current.notes=document.getElementById('admin_notes')?.value||'';
  current.brandNote=document.getElementById('admin_brandNote')?.value||'';
  // Iterate only active shot codes (present in current.shots)
  const dynCodes = Object.keys(current.shots||{});
  dynCodes.forEach(code=>{
    if(!current.shots) current.shots={};
    if(!current.shots[code]) current.shots[code]={label:SHOT_LABELS[code]||code,required:false,img:'',desc:''};
    current.shots[code].required=document.getElementById('req_'+code)?.checked||false;
    current.shots[code].desc=document.getElementById('desc_'+code)?.value||'';
    current.shots[code].img=document.getElementById('imgurl_'+code)?.value.trim()||current.shots[code].img||'';
    current.shots[code].label=SHOT_LABELS[code]||current.shots[code].label||code;
  });
  // Save crop slots
  if(!current.cropSlots) current.cropSlots=[];
  document.querySelectorAll('input[id^="cropurl_"]').forEach(input=>{
    const i=parseInt(input.dataset.cropidx);
    if(!current.cropSlots[i]) current.cropSlots[i]={label:'',img:''};
    current.cropSlots[i].img=input.value.trim();
    const lbl=document.getElementById('croplabel_'+i);
    if(lbl) current.cropSlots[i].label=lbl.value.trim();
  });
  // Remove empty crop slots
  current.cropSlots=current.cropSlots.filter(s=>s.img||s.label);
  status.textContent='Applied';
  setUnsaved(true);
  setTimeout(()=>status.textContent='',2500);
  render();
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.json';
  a.click();
  setUnsaved(false);
  const st=document.getElementById('saveStatus');
  if(st){st.textContent='Exported ✓';setTimeout(()=>st.textContent='',2500);}
}
function addExtraShot(){
  const cur=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!cur) return;
  if(!cur.shots) cur.shots={};
  // Find next available E number
  let n=1;
  while(cur.shots['E'+n]) n++;
  const code='E'+n;
  cur.shots[code]={label:'Extra '+n,required:false,img:'',desc:''};
  setUnsaved(true);
  buildAdminForm();
  render();
}
function setBrand(b){ activeBrand=b; const f=getFiltered(); ensureActive(f); activeShot=null; render(); if(adminOpen) buildAdminForm(); }
function setCat(c){ activeCat=c; activeSub=Object.keys(DATA[activeBrand]?.[c]||{})[0]||""; activeShot=null; render(); if(adminOpen) buildAdminForm(); }
function setSub(s){ activeSub=s; activeShot=null; render(); if(adminOpen) buildAdminForm(); }
var editMode = false;

function setEditMode(on) {
  editMode = on;
  var btn = document.getElementById("adminBtn");
  if (btn) btn.classList.toggle("active", on);
  render();
  if (on) openAdmin();
  else closeAdmin();
}

function handleShotClick(evt, code, idx){
  evt.stopPropagation();
  if (editMode) document.getElementById("shot-file-"+code)?.click();
}

function openPreview(code) {
  var current = DATA[activeBrand]?.[activeCat]?.[activeSub];
  if (!current || !current.shots || !current.shots[code]) return;
  // Prefer live value from URL input if in edit mode
  var img = (editMode && document.getElementById('imgurl_'+code))
    ? document.getElementById('imgurl_'+code).value.trim() || current.shots[code].img
    : current.shots[code].img;
  if (!img) return;
  var overlay = document.getElementById("previewOverlay");
  var imgEl   = document.getElementById("previewImg");
  if (!overlay || !imgEl) return;
  imgEl.src = img;
  overlay.style.display = "flex";
  document.getElementById("previewLabel").textContent =
    (current.shots[code].label || code) + " — " + activeSub;
}

function closePreview() {
  var overlay = document.getElementById("previewOverlay");
  if (overlay) overlay.style.display = "none";
}

function handleShotFileUpload(code, input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    saveImgToData(code, e.target.result);
    render();
  };
  reader.readAsDataURL(file);
}

function handleBulkUpload(input){
  const files=Array.from(input.files);
  if(!files.length) return;
  const current=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!current) return;
  const codes=Object.keys(current.shots||{});
  let loaded=0;
  files.forEach((file,i)=>{
    if(i>=codes.length) return;
    const code=codes[i];
    const reader=new FileReader();
    reader.onload=e=>{
      saveImgToData(code,e.target.result);
      loaded++;
      if(loaded===Math.min(files.length,codes.length)) render();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

var _hasUnsaved=false;
function setUnsaved(v){
  _hasUnsaved=v;
  const b=document.getElementById('unsavedBadge');
  if(b)b.classList.toggle('visible',v);
}

function saveImgToData(code, b64){
  const current=DATA[activeBrand]?.[activeCat]?.[activeSub];
  if(!current) return;
  if(!current.shots) current.shots={};
  if(!current.shots[code]) current.shots[code]={label:SHOT_LABELS[code]||code,required:code!=='E1',img:'',desc:''};
  current.shots[code].img=b64;
  setUnsaved(true);
}
function toggleShot(i){ activeShot=activeShot===i?null:i; render(); }

document.getElementById("adminOverlay").addEventListener("click", function(e){ if(e.target===this) closeAdmin(); });

var _heroDismissed = false;

function dismissHero(){
  _heroDismissed = true;
  var hero = document.getElementById('searchHero');
  if(hero){
    hero.classList.add('dismissed');
    setTimeout(function(){ hero.style.display = 'none'; }, 300);
  }
  // Reveal navigation
  var catnav = document.getElementById('catnav');
  var subcatnav = document.getElementById('subcatnav');
  if(catnav) catnav.classList.remove('catnav-hidden');
  if(subcatnav) subcatnav.classList.remove('subcatnav-hidden');
  // Reveal topbar search and edit button with fade
  var tc = document.getElementById('topbarCenter');
  var tr = document.getElementById('topbarRight');
  if(tc){ tc.style.opacity='0'; tc.style.visibility='visible'; setTimeout(function(){ tc.style.opacity='1'; },20); }
  if(tr){ tr.style.opacity='0'; tr.style.visibility='visible'; setTimeout(function(){ tr.style.opacity='1'; },20); }
  // Carry query to topbar
  var si = document.getElementById('searchInput');
  if(si){ si.value = searchQ; if(searchQ) si.focus(); }
}

function renderHero(){
  if(_heroDismissed) return;
  var hero = document.getElementById('searchHero');
  if(hero) hero.style.display = 'flex';
}

var _imgObserver = typeof IntersectionObserver !== 'undefined'
  ? new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          const img=e.target;
          if(img.dataset.src){ img.src=img.dataset.src; delete img.dataset.src; }
          _imgObserver.unobserve(img);
        }
      });
    }, {rootMargin:'100px'})
  : null;

function lazyImg(src, alt, style){
  const isB64 = src.startsWith('data:');
  if(isB64 || !_imgObserver){
    return '<img src="'+src+'" alt="'+alt+'" style="'+style+'">';
  }
  return '<img data-src="'+src+'" alt="'+alt+'" style="'+style+'" src="" class="lazy-img">';
}

function clearTopbarSearch(){
  searchQ = '';
  var si = document.getElementById('searchInput');
  if(si){ si.value = ''; si.focus(); }
  var cl = document.getElementById('searchClear');
  if(cl) cl.classList.remove('visible');
  activeShot = null;
  render();
}

document.getElementById("searchInput").addEventListener("input", function(e){
  if(!DATA_LOADED) return;
  searchQ = e.target.value;
  var cl = document.getElementById('searchClear');
  if(cl) cl.classList.toggle('visible', searchQ.length > 0);
  activeShot = null;
  render();
});
document.getElementById("searchInput").addEventListener("keydown", function(e){
  if(e.key==="Escape"){ clearTopbarSearch(); }
});

(function(){
  var hi = document.getElementById('heroSearchInput');
  if(!hi) return;
  hi.addEventListener('input', function(){
    // No DATA_LOADED guard here — update searchQ immediately so Enter works
    searchQ = hi.value;
    var si = document.getElementById('searchInput');
    if(si) si.value = searchQ;
    var cl = document.getElementById('searchClear');
    if(cl) cl.classList.toggle('visible', searchQ.length > 0);
    activeShot = null;
    if(DATA_LOADED) render(); // render in background only if data ready
  });
  hi.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){
      searchQ = ''; hi.value = '';
      var si = document.getElementById('searchInput'); if(si) si.value = '';
      var cl = document.getElementById('searchClear'); if(cl) cl.classList.remove('visible');
      if(DATA_LOADED) render();
    }
    if(e.key === 'Enter'){ dismissHero(); } // dismiss on Enter regardless of query
  });
  setTimeout(function(){ hi.focus(); }, 80);
})();

loadData();
// Render brand switch immediately so buttons appear before data loads
renderBrandSwitch();
</script>
</body>
